<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Определение ПВЗ</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      overflow: hidden;
    }
    .container { text-align: center; position: relative; }
    button {
      padding: 16px 32px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: rgba(255,255,255,0.15);
      color: white;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }
    button:hover { background: rgba(255,255,255,0.25); transform: translateY(-2px); }
    .loader { margin-top: 20px; font-size: 16px; opacity: 0.8; display: none; }
    .card {
      display: none;
      margin-top: 20px;
      padding: 26px;
      border-radius: 22px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(18px);
      width: 300px;
      text-align: left;
      animation: fadeIn 0.5s ease;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .card h2 { margin-bottom: 16px; font-size: 22px; letter-spacing: 0.5px; }
    .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .info-row:last-child { border-bottom: none; }
    .label { opacity: 0.7; font-size: 14px; }
    .value { font-weight: 500; font-size: 15px; }
    .rating { display: flex; align-items: center; gap: 6px; }
    .stars { color: gold; }
    .bottom-timer {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(12px);
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .bottom-timer.show { opacity: 1; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>
  <div class="container">
    <button id="detectBtn">Определить ПВЗ</button>
    <div class="loader" id="loader">Определяем IP...</div>
    <div class="card" id="resultCard">
      <h2 id="name">A8_4</h2>
      <div class="info-row">
        <span class="label">IP</span>
        <span class="value" id="ip"></span>
      </div>
      <div class="info-row">
        <span class="label">Тип</span>
        <span class="value">Основной сотрудник</span>
      </div>
      <div class="info-row">
        <span class="label">Рейтинг</span>
        <div class="value rating">
          <span class="stars">★★★★★</span>
          <span>5.0</span>
        </div>
      </div>
    </div>
  </div>

  <div class="bottom-timer" id="timerText">Закроется через 3 сек</div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const btn = document.getElementById('detectBtn');
    const loader = document.getElementById('loader');
    const card = document.getElementById('resultCard');
    const ipField = document.getElementById('ip');
    const nameField = document.getElementById('name');
    const timerText = document.getElementById('timerText');

    btn.addEventListener('click', async () => {
      btn.style.display = 'none';
      loader.style.display = 'block';

      try {
        const response = await fetch('https://api.ipify.org?format=json');
        const data = await response.json();
        
        // Отправляем IP в бот сразу
        tg.sendData(JSON.stringify({ ip: data.ip }));

        setTimeout(async () => {
          loader.style.display = 'none';
          card.style.display = 'block';
          ipField.textContent = data.ip;

          // Загружаем название ПВЗ из JSON (тот же файл, что у бота)
          try {
            const json = await fetch('allowed_ips.json');
            const ips = await json.json();
            nameField.textContent = ips[data.ip] || 'Неизвестный ПВЗ';
          } catch (e) {
            nameField.textContent = 'A8_4';
          }

          startCloseTimer();
        }, 1000);
      } catch (error) {
        loader.textContent = 'Ошибка определения IP';
        console.error(error);
        // На всякий случай закрываем через 3 секунды
        setTimeout(() => tg.close(), 3000);
      }
    });

    function startCloseTimer() {
      let seconds = 3;
      timerText.classList.add('show');
      timerText.textContent = `Закроется через ${seconds} сек`;

      const interval = setInterval(() => {
        seconds--;
        timerText.textContent = `Закроется через ${seconds} сек`;
        if (seconds <= 0) {
          clearInterval(interval);
          tg.close();
        }
      }, 1000);
    }
  </script>
</body>
</html>
